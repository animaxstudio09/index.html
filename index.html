<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RJ ROCKY | Ultra Pro UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { 
            --cyan: #00f2ff; 
            --bg: #050a0e; 
            --card: rgba(255, 255, 255, 0.03); 
            --text: #fff;
            --glow: 0 0 15px rgba(0, 242, 255, 0.4); 
        }

        body.light-mode {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1a1a1a;
            --cyan: #007bff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 75px; overflow-x: hidden; }

        /* --- Login Screen --- */
        #loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .login-card { padding: 40px 20px; width: 90%; max-width: 350px; background: var(--card); border: 1px solid var(--cyan); border-radius: 30px; box-shadow: var(--glow); }
        .login-btn { background: #fff; color: #000; border: none; padding: 12px 20px; border-radius: 50px; font-weight: bold; display: flex; align-items: center; gap: 10px; cursor: pointer; margin: 20px auto; width: 100%; justify-content: center; }

        /* --- Header --- */
        .cyber-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 1000; border-bottom: 1px solid rgba(128,128,128,0.1); }
        .cyber-logo { font-family: 'Orbitron'; color: var(--cyan); text-shadow: var(--glow); font-size: 18px; font-weight: bold; }

        /* --- Content Pages --- */
        .page { display: none; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Video Cards --- */
        .video-card { width: 100%; margin-bottom: 15px; cursor: pointer; }
        .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .v-info { padding: 10px 15px; }
        #player-wrap { width: 100%; aspect-ratio: 16/9; background: #000; display: none; position: sticky; top: 0; z-index: 2000; border-bottom: 2px solid var(--cyan); }
        iframe { width: 100%; height: 100%; border: none; }

        /* --- Shorts --- */
        #shortsPage { height: calc(100vh - 75px); overflow-y: scroll; scroll-snap-type: y mandatory; background: #000; }
        .short-item { width: 100%; height: 100%; scroll-snap-align: start; position: relative; }

        /* --- Profile UI --- */
        .profile-wrap { padding: 25px 15px; }
        .luxury-card { background: var(--card); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 30px; padding: 35px 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .p-img-box { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--cyan); margin: 0 auto 15px; overflow: hidden; box-shadow: var(--glow); }
        #vipBadge { display: none; margin: 10px auto; padding: 5px 15px; background: var(--cyan); color: #000; border-radius: 20px; font-size: 10px; font-weight: bold; font-family: 'Orbitron'; }
        
        /* Unique Token Box */
        .token-container { margin-top: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 20px; border: 1px dashed var(--cyan); }
        .token-box { display: flex; background: #000; border-radius: 12px; padding: 5px; border: 1px solid #333; }
        .token-box input { flex: 1; background: transparent; border: none; padding: 10px; color: var(--cyan); outline: none; font-family: 'Orbitron'; font-size: 11px; }
        .token-box button { background: var(--cyan); color: #000; border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; }

        .setting-item { background: rgba(128,128,128,0.08); padding: 12px 15px; border-radius: 15px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }

        /* --- Navbar --- */
        .navbar { position: fixed; bottom: 0; width: 100%; background: var(--bg); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid rgba(128,128,128,0.1); z-index: 3000; }
        .nav-item { color: #888; text-align: center; font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--cyan); text-shadow: var(--glow); }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h1 class="cyber-logo" style="font-size: 26px; margin-bottom: 10px;">RJ ROCKY</h1>
            <p style="font-size: 11px; color: #888; margin-bottom: 20px;">Secure Login with Google Account</p>
            <button class="login-btn" onclick="googleLogin()">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20"> Sign in with Google
            </button>
        </div>
    </div>

    <div id="player-wrap"></div>

    <div id="homePage" class="page active">
        <div class="cyber-header"><div class="cyber-logo">RJ ROCKY</div><div style="color:var(--cyan);">🔍</div></div>
        <div id="mainFeed"></div>
    </div>

    <div id="shortsPage" class="page">
        <div id="shortsFeed"></div>
    </div>

    <div id="profilePage" class="page">
        <div class="profile-wrap">
            <div class="luxury-card">
                <div class="p-img-box"><img id="userImg" src="" style="width:100%"></div>
                <h2 id="displayName" style="font-family:'Orbitron'; font-size:18px;">GUEST</h2>
                <p id="userEmail" style="font-size: 10px; color: #888; margin-bottom: 5px;"></p>
                <div id="vipBadge">💎 VIP MEMBER</div>
                
                <a id="buyBtn" href="https://t.me/aminezone09?text=Hello%20RJ%20ROCKY,%20I%20want%20to%20get%20Premium%20Access%20Token!" style="display:block; background:linear-gradient(90deg, var(--cyan), #0066ff); color:#000; padding:12px; border-radius:12px; font-family:'Orbitron'; text-decoration:none; font-weight:bold; margin:15px 0; font-size:12px;">GET VIP ACCESS</a>

                <div class="token-container">
                    <p style="font-size: 9px; color: var(--cyan); text-align: left; margin-bottom: 8px; font-family: 'Orbitron';">REDEEM TOKEN</p>
                    <div class="token-box">
                        <input type="text" id="tokenInput" placeholder="XXXX-XXXX-XXXX">
                        <button onclick="checkToken()">REDEEM</button>
                    </div>
                </div>

                <div class="setting-item">
                    <span style="font-size:12px">Night Mode</span>
                    <input type="checkbox" id="themeToggle" onclick="toggleTheme()">
                </div>
                
                <button onclick="logout()" style="margin-top:20px; background:none; border:1px solid #ff4444; color:#ff4444; padding:8px 20px; border-radius:10px; font-size:10px; width:100%; cursor:pointer;">Sign Out</button>
                <p style="margin-top: 15px; font-size: 9px; color: #555;">Dev: T.me/aminezone09</p> [cite: 2026-01-31]
            </div>
        </div>
    </div>

    <div class="navbar">
        <div class="nav-item active" onclick="nav('homePage', this)">Home</div>
        <div class="nav-item" onclick="nav('shortsPage', this)">Shorts</div>
        <div class="nav-item" onclick="nav('profilePage', this)">Profile</div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBcWE5TCxamMSnJxqSm5X4mgSwSccIXcBI",
          authDomain: "myanimeapp-8d079.firebaseapp.com",
          databaseURL: "https://myanimeapp-8d079-default-rtdb.firebaseio.com",
          projectId: "myanimeapp-8d079",
          storageBucket: "myanimeapp-8d079.firebasestorage.app",
          messagingSenderId: "37482342893",
          appId: "1:37482342893:web:bebc7352e4bc102b725fe4"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert("Login Failed: " + err.message));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('displayName').innerText = user.displayName;
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('userImg').src = user.photoURL;

                db.ref('users/' + user.uid).update({
                    name: user.displayName,
                    email: user.email,
                    photo: user.photoURL,
                    lastOnline: firebase.database.ServerValue.TIMESTAMP
                });

                const statusRef = db.ref('online_users/' + user.uid);
                statusRef.set(true);
                statusRef.onDisconnect().remove();

            } else {
                document.getElementById('loginScreen').style.display = 'flex';
            }
        });

        db.ref('anime').on('value', snap => {
            const feed = document.getElementById('mainFeed');
            const sFeed = document.getElementById('shortsFeed');
            feed.innerHTML = ""; sFeed.innerHTML = "";
            if(snap.exists()){
                Object.keys(snap.val()).reverse().forEach(key => {
                    const v = snap.val()[key];
                    const url = v.url.includes('dropbox.com') ? v.url.replace('dl=0', 'raw=1') : v.url;
                    
                    feed.innerHTML += `
                        <div class="video-card" onclick="playVideo('${key}','${url}')">
                            <img src="${v.img}">
                            <div class="v-info"><h3>${v.title}</h3><p class="v-meta">RJ ROCKY • <span id="v-${key}">0</span> views</p></div>
                        </div>`;
                    
                    sFeed.innerHTML += `
                        <div class="short-item">
                            <iframe src="${url}" allow="autoplay"></iframe>
                        </div>`;
                    db.ref(`views/${key}`).on('value', s => { if(document.getElementById(`v-${key}`)) document.getElementById(`v-${key}`).innerText = s.val() || 0; });
                });
            }
        });

        function playVideo(id, url) {
            db.ref(`views/${id}`).transaction(c => (c || 0) + 1);
            const p = document.getElementById('player-wrap');
            p.style.display = 'block';
            p.innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay"></iframe>`;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            
            document.getElementById('player-wrap').innerHTML = "";
            document.getElementById('player-wrap').style.display = 'none';
            if(id !== 'shortsPage') {
                const sFeed = document.getElementById('shortsFeed');
                const content = sFeed.innerHTML;
                sFeed.innerHTML = ""; 
                setTimeout(() => { sFeed.innerHTML = content; }, 50);
            }
        }

        function checkToken() {
            const token = document.getElementById('tokenInput').value.trim();
            if(!token) return alert("Please enter a token!");
            db.ref('premium_codes/' + token).once('value', snap => {
                if(snap.exists() && snap.val().status === 'active') {
                    localStorage.setItem('vip', 'true');
                    db.ref('premium_codes/' + token).update({ status: 'used', usedBy: auth.currentUser.email });
                    alert("💎 VIP Activated Successfully!"); location.reload();
                } else { alert("Invalid Token or Already Used!"); }
            });
        }

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('rj_theme', isLight ? 'light' : 'dark');
        }

        function logout() { auth.signOut(); localStorage.clear(); location.reload(); }

        window.onload = () => {
            if(localStorage.getItem('rj_theme') === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('themeToggle').checked = true;
            }
            if(localStorage.getItem('vip') === 'true') {
                document.getElementById('vipBadge').style.display = 'block';
                document.getElementById('buyBtn').style.display = 'none';
            }
        };
    </script>
</body>
</html>
